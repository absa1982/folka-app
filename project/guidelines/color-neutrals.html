<!-- @dsCard group="Colors" viewport="700x180" name="Warm neutrals & ink" subtitle="Sand surfaces and green-tinted ink text scale" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 6px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 8px; }
</style>
</head>
<body>
  <div class="lbl">Sand surfaces</div>
  <div class="grid" style="margin-bottom:16px">
    <div><div class="chip" style="background:var(--sand-50)"></div><div class="name">sand-50</div><div class="hex">#FAF8F3</div></div>
    <div><div class="chip" style="background:var(--sand-100)"></div><div class="name">sand-100</div><div class="hex">#F3EFE7</div></div>
    <div><div class="chip" style="background:var(--sand-200)"></div><div class="name">sand-200</div><div class="hex">#E8E2D6</div></div>
    <div><div class="chip" style="background:var(--sand-300)"></div><div class="name">sand-300</div><div class="hex">#D8D0C0</div></div>
    <div><div class="chip" style="background:var(--white)"></div><div class="name">white</div><div class="hex">#FFFFFF</div></div>
  </div>
  <div class="lbl">Ink (text)</div>
  <div class="grid">
    <div><div class="chip" style="background:var(--ink-900)"></div><div class="name">ink-900</div><div class="hex">#18211D</div></div>
    <div><div class="chip" style="background:var(--ink-700)"></div><div class="name">ink-700</div><div class="hex">#3A443E</div></div>
    <div><div class="chip" style="background:var(--ink-500)"></div><div class="name">ink-500</div><div class="hex">#6B756E</div></div>
    <div><div class="chip" style="background:var(--ink-400)"></div><div class="name">ink-400</div><div class="hex">#97A09A</div></div>
    <div><div class="chip" style="background:var(--ink-300)"></div><div class="name">ink-300</div><div class="hex">#C2C8C2</div></div>
  </div>
</body>
</html>
