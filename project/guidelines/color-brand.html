<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Spruce green" subtitle="Primary ramp; --green-600 is the core brand color" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid rgba(24,33,29,.06); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 6px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); }
  .star { position: absolute; top: 6px; right: 8px; color: #fff; font-size: 11px; font-weight: 700; }
  .sw { position: relative; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--green-100)"></div><div class="name">green-100</div><div class="hex">#D4ECE2</div></div>
    <div class="sw"><div class="chip" style="background:var(--green-300)"></div><div class="name">green-300</div><div class="hex">#74BFA1</div></div>
    <div class="sw"><div class="chip" style="background:var(--green-500)"></div><div class="name">green-500</div><div class="hex">#1E8A63</div></div>
    <div class="sw"><div class="chip" style="background:var(--green-600)"><span class="star">★ primary</span></div><div class="name">green-600</div><div class="hex">#157254</div></div>
    <div class="sw"><div class="chip" style="background:var(--green-700)"></div><div class="name">green-700</div><div class="hex">#115A43</div></div>
    <div class="sw"><div class="chip" style="background:var(--green-900)"></div><div class="name">green-900</div><div class="hex">#0A3527</div></div>
  </div>
</body>
</html>
