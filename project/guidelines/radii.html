<!-- @dsCard group="Spacing" viewport="700x170" name="Corner radii" subtitle="From inputs (10) to cards (14) to hero (28)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 76px; height: 60px; background: var(--green-50); border: 1.5px solid var(--green-400); }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 8px; }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="tok">sm</div><div class="px">6px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="tok">md</div><div class="px">10px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="tok">lg · card</div><div class="px">14px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="tok">xl</div><div class="px">20px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="tok">2xl</div><div class="px">28px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill);width:60px"></div><div class="tok">pill</div><div class="px">999</div></div>
  </div>
</body>
</html>
