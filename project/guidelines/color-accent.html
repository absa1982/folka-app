<!-- @dsCard group="Colors" viewport="700x150" name="Accent — Clay" subtitle="Warm coral, used sparingly for emphasis & illustration" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid rgba(24,33,29,.06); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 6px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--clay-50)"></div><div class="name">clay-50</div><div class="hex">#FCEEE9</div></div>
    <div class="sw"><div class="chip" style="background:var(--clay-100)"></div><div class="name">clay-100</div><div class="hex">#FBE3DC</div></div>
    <div class="sw"><div class="chip" style="background:var(--clay-300)"></div><div class="name">clay-300</div><div class="hex">#F2A993</div></div>
    <div class="sw"><div class="chip" style="background:var(--clay-500)"></div><div class="name">clay-500</div><div class="hex">#E8674A</div></div>
    <div class="sw"><div class="chip" style="background:var(--clay-600)"></div><div class="name">clay-600</div><div class="hex">#D2543C</div></div>
    <div class="sw"><div class="chip" style="background:var(--clay-700)"></div><div class="name">clay-700</div><div class="hex">#B0432F</div></div>
  </div>
</body>
</html>
