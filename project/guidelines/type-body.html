<!-- @dsCard group="Type" viewport="700x230" name="Body, labels & eyebrow" subtitle="UI text roles from lead to micro" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid var(--sand-100); }
  .row:last-child { border-bottom: none; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); width: 130px; flex: none; }
</style>
</head>
<body>
  <div class="row"><span class="meta">eyebrow · 11 / 700</span><span class="eyebrow">Time registration</span></div>
  <div class="row"><span class="meta">lead · 17 / 400</span><span style="font-size:var(--fs-lg);color:var(--text-body)">Save time, avoid fines, keep a calmer workplace.</span></div>
  <div class="row"><span class="meta">body · 15 / 400</span><span style="font-size:var(--fs-body);color:var(--text-body)">Employees register hours, holiday and absence with one tap.</span></div>
  <div class="row"><span class="meta">small · 13 / 500</span><span style="font-size:var(--fs-sm);font-weight:500;color:var(--text-body)">Updated 2 minutes ago</span></div>
  <div class="row"><span class="meta">xs / meta · 12</span><span style="font-size:var(--fs-xs);color:var(--text-muted)">3 of 8 tasks complete</span></div>
</body>
</html>
