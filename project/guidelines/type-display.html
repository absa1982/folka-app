<!-- @dsCard group="Type" viewport="700x260" name="Display & headings" subtitle="Hanken Grotesk — sentence case, tight tracking" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--sand-100); }
  .row:last-child { border-bottom: none; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); width: 130px; flex: none; }
  .spec { color: var(--text-heading); }
</style>
</head>
<body>
  <div class="row"><span class="meta">display · 56 / 800</span><span class="spec" style="font-size:var(--fs-display);font-weight:800;letter-spacing:-.02em;line-height:1">People, handled.</span></div>
  <div class="row"><span class="meta">h1 · 40 / 700</span><span class="spec" style="font-size:var(--fs-h1);font-weight:700;letter-spacing:-.02em">Approve your week</span></div>
  <div class="row"><span class="meta">h2 · 30 / 700</span><span class="spec" style="font-size:var(--fs-h2);font-weight:700;letter-spacing:-.01em">Onboarding checklist</span></div>
  <div class="row"><span class="meta">h3 · 23 / 600</span><span class="spec" style="font-size:var(--fs-h3);font-weight:600">Time registration</span></div>
  <div class="row"><span class="meta">h4 · 19 / 600</span><span class="spec" style="font-size:var(--fs-h4);font-weight:600">Equipment</span></div>
</body>
</html>
