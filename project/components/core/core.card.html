<!-- @dsCard group="Components" viewport="700x440" name="Core — buttons, inputs & controls" subtitle="Button, Input, Select, Checkbox, Radio, Switch, FormField" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .grp { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 18px; }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 8px; }
  .col { display: flex; flex-direction: column; gap: 14px; }
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Input, Select, Checkbox, Radio, Switch, FormField } = window.FolkaDesignSystem_019e18;
  const ic = (n) => <i data-lucide={n} style={{ width: 16, height: 16, display: 'flex' }} />;

  function Demo() {
    const [chk, setChk] = React.useState(true);
    const [plan, setPlan] = React.useState('premium');
    const [on, setOn] = React.useState(true);
    return (
      <div>
        <div className="lbl">Buttons</div>
        <div className="grp">
          <Button leftIcon={ic('plus')}>Add employee</Button>
          <Button variant="secondary">Book a demo</Button>
          <Button variant="ghost">Cancel</Button>
          <Button variant="danger" leftIcon={ic('user-minus')}>Offboard</Button>
          <Button disabled>Disabled</Button>
          <IconButton icon={ic('more-horizontal')} variant="outline" aria-label="More" />
        </div>
        <div className="grp">
          <Button size="sm">Small</Button>
          <Button size="md">Medium</Button>
          <Button size="lg">Large</Button>
        </div>
        <div className="two" style={{ marginTop: 8 }}>
          <div className="col">
            <div className="lbl">Inputs</div>
            <FormField label="Search" htmlFor="s">
              <Input id="s" placeholder="Search employees" leftIcon={ic('search')} />
            </FormField>
            <FormField label="Department" htmlFor="d">
              <Select id="d" defaultValue="dev">
                <option value="">All departments</option>
                <option value="sales">Salg</option>
                <option value="dev">Udvikling</option>
              </Select>
            </FormField>
            <FormField label="Work email" htmlFor="e" error="Enter a valid email.">
              <Input id="e" invalid defaultValue="anna@" />
            </FormField>
          </div>
          <div className="col">
            <div className="lbl">Selection</div>
            <Checkbox checked={chk} onChange={setChk} label="Signed contract" />
            <Checkbox checked={false} onChange={() => {}} label="IT account created" />
            <Radio name="p" value="free" checked={plan === 'free'} onChange={setPlan} label="Freemium" />
            <Radio name="p" value="premium" checked={plan === 'premium'} onChange={setPlan} label="Premium" />
            <Switch checked={on} onChange={setOn} label="Weekly approval reminder" />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
