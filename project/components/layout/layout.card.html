<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Card, CardHeader, Tabs, Dialog, Button, StatusPill, ProgressBar } = window.FolkaDesignSystem_019e18;

  function Demo() {
    const [tab, setTab] = React.useState('pending');
    const [open, setOpen] = React.useState(false);
    return (
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
        <Card>
          <CardHeader title="This week" subtitle="6 of 12 approved"
            action={<Button size="sm" variant="ghost">View all</Button>} />
          <Tabs value={tab} onChange={setTab} tabs={[
            { id: 'all', label: 'All', badge: 12 },
            { id: 'pending', label: 'Pending', badge: 6 },
            { id: 'approved', label: 'Approved' },
          ]} />
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginTop: 16 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ fontSize: 14, color: 'var(--text-body)' }}>Anna Mortensen · 37,5 t</span>
              <StatusPill status="pending" />
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ fontSize: 14, color: 'var(--text-body)' }}>Lars Frank · 40 t</span>
              <StatusPill status="approved" />
            </div>
          </div>
        </Card>

        <Card interactive>
          <CardHeader title="Onboarding · Sofie" subtitle="Starts 1. mar 2026" />
          <ProgressBar value={3} max={8} showLabel />
          <p style={{ fontSize: 13, color: 'var(--text-muted)', marginTop: 12 }}>3 of 8 tasks complete. Next: order laptop.</p>
          <Button style={{ marginTop: 8 }} onClick={() => setOpen(true)}>Open dialog</Button>
        </Card>

        <Dialog open={open} onClose={() => setOpen(false)} title="Approve week"
          footer={<><Button variant="ghost" onClick={() => setOpen(false)}>Cancel</Button><Button onClick={() => setOpen(false)}>Approve week</Button></>}>
          <p style={{ fontSize: 15, color: 'var(--text-body)' }}>Approve Anna's 37,5 hours for the week of 24 Feb? Hours will be locked for payroll.</p>
        </Dialog>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
