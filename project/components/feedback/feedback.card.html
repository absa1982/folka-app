<!-- @dsCard group="Components" viewport="700x360" name="Feedback — badges, status, avatars, toasts" subtitle="Badge, StatusPill, Avatar, ProgressBar, Toast, Tooltip" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 10px; }
  .grp { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 22px; }
  .sec { margin-bottom: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Badge, StatusPill, Avatar, ProgressBar, Toast, Tooltip, IconButton } = window.FolkaDesignSystem_019e18;
  const ic = (n) => <i data-lucide={n} style={{ width: 16, height: 16, display: 'flex' }} />;

  function Demo() {
    return (
      <div>
        <div className="lbl">Badges</div>
        <div className="grp">
          <Badge tone="brand">Premium</Badge>
          <Badge tone="accent">3 new</Badge>
          <Badge tone="success">Compliant</Badge>
          <Badge tone="warning">Trial</Badge>
          <Badge tone="neutral" size="sm">Udvikling</Badge>
        </div>

        <div className="lbl">Status pills</div>
        <div className="grp">
          <StatusPill status="approved" />
          <StatusPill status="pending" />
          <StatusPill status="overdue" />
          <StatusPill status="active" />
          <StatusPill status="invited" />
          <StatusPill status="draft" />
        </div>

        <div className="lbl">Avatars & progress</div>
        <div className="grp">
          <Avatar name="Anna Mortensen" />
          <Avatar name="Lars Frank" />
          <Avatar name="Sine Halkjær" />
          <Avatar name="Marco Gam" size="lg" />
          <div style={{ flex: 1, minWidth: 180 }}><ProgressBar value={3} max={8} showLabel /></div>
        </div>

        <div className="lbl">Toast & tooltip</div>
        <div className="grp" style={{ alignItems: 'flex-start' }}>
          <Toast tone="success" iconNode={ic('check-circle')} title="Week approved" message="Anna's hours are locked for payroll." onClose={() => {}} />
          <Tooltip label="Approve week"><IconButton icon={ic('check')} variant="brand" aria-label="Approve" /></Tooltip>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
